name: Notify ampelos-web on wiki edit

on:
  gollum:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ampelos-web deploy
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${{ secrets.AMPELOS_WEB_DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/nsrosenqvist/ampelos-web/dispatches \
            -d '{"event_type":"wiki-updated"}'
