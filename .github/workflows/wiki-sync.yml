name: Sync docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

# Concurrency: only one wiki push at a time per branch. A queued run
# replaces an in-flight one because the latest content is what we
# actually want pushed.
concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Sync to wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/
          token: ${{ secrets.GITHUB_TOKEN }}
          # Rewrites .md cross-links to bare wiki links so authoring
          # works in editor previews, in the repo browser, and on the
          # wiki — same source, three contexts.
          preprocess: true
