# Example pre-commit config. `croft install` (and `croft hooks
# install` directly) clone external repos into `.croft/cache/hooks/`
# the first time a hook runs and re-use the cache thereafter.
# `croft install --update-hooks` forces a re-clone when you bump
# revisions.
#
# Supported languages: `system` and `script`. Other languages
# (`python`, `node`, `ruby`, …) are not implemented; croft errors
# at install time rather than silently skipping.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^\.croft/

  - repo: local
    hooks:
      - id: rust-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --check
        pass_filenames: false
        files: \.rs$
