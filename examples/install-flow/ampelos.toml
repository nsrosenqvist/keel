# Example: ordered first-time setup with .ampelos/install/ scripts.
#
# Run `ampelos install` from this directory to walk through the
# numbered steps under .ampelos/install/. Each step writes a marker
# file under `state/` so you can see exactly which steps ran.
#
# Try:
#   ampelos install                       # full plan
#   ampelos install --list                # plan + last status per step
#   ampelos install --dry-run             # preview without executing
#   ampelos install 03-seed-db            # single-step mode
#   ampelos install --restart             # wipe state, run from step 1

[project]
name        = "install-flow-demo"
description = "Walk-through of ampelos install"

[runtime]
backend = "none"             # host-only; no compose preflight

# `install_with_setup = false` keeps things demo-focused; in real
# projects you usually want the default (true).
[agents]
install_with_setup = false

[install]
install_git_hooks = false    # the hooks example covers that surface
