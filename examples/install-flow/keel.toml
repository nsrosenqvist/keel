# Example: ordered first-time setup with .keel/install/ scripts.
#
# Run `keel install` from this directory to walk through the
# numbered steps under .keel/install/. Each step writes a marker
# file under `state/` so you can see exactly which steps ran.
#
# Try:
#   keel install                       # full plan
#   keel install --list                # plan + last status per step
#   keel install --dry-run             # preview without executing
#   keel install 03-seed-db            # single-step mode
#   keel install --restart             # wipe state, run from step 1

[project]
name        = "install-flow-demo"
description = "Walk-through of keel install"

[containers]
backend = "none"             # host-only; no compose preflight

# `install_with_setup = false` keeps things demo-focused; in real
# projects you usually want the default (true).
[agents]
install_with_setup = false

[install]
install_git_hooks = false    # the hooks example covers that surface
