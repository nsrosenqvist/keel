[project]
name = "devcontainer-example"
description = "Demonstrates the opt-in devcontainer feature."

[containers]
backend = "none"

[devcontainer]
enabled = true
# Auto-detects .devcontainer/devcontainer.json — no `path` needed.

[command.greet]
desc = "Print the container's OS info — runs inside the devcontainer."
run = "uname -a && cat /etc/os-release | head -3"

[command.shell]
desc = "Drop into a shell inside the devcontainer (also: `scaffl shell`)."
run = "exec ${SHELL:-/bin/sh}"
tty = true
